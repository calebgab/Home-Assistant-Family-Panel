services:
  family-panel:
    build: .
    container_name: family-panel
    restart: unless-stopped
    ports:
      - "${FP_PORT:-8080}:8080"
    volumes:
      - family-panel-data:/data
    environment:
      - FP_DATA_DIR=/data
      # Set your Home Assistant credentials here — no config.json needed
      # - FP_HA_URL=http://homeassistant.local:8123
      # - FP_HA_TOKEN=your_long_lived_token_here

volumes:
  family-panel-data:
