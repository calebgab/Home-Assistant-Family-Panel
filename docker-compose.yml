services:
  family-panel:
    build: .
    container_name: family-panel
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # DATA_DIR should point to a folder on the host containing config.json and data.json.
      # Default is the current directory (works for local docker compose up).
      # In Portainer, set DATA_DIR=/opt/family-panel (or wherever your files live).
      - ${DATA_DIR:-.}/config.json:/app/config.json
      - ${DATA_DIR:-.}/data.json:/app/data.json
    environment:
      # Environment variables override config.json values.
      # Recommended for secrets — avoids storing tokens in config.json.
      - FP_PORT=8080
      # - FP_HA_URL=http://homeassistant.local:8123
      # - FP_HA_TOKEN=your_long_lived_token_here
