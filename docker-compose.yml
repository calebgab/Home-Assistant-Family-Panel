services:
  family-panel:
    build: .
    container_name: family-panel
    restart: unless-stopped
    ports:
      - "${FP_PORT:-8080}:8080"
    volumes:
      - family-panel-data:/data
    environment:
      - FP_DATA_DIR=/data
      # Set FP_HA_URL and FP_HA_TOKEN in Portainer's "Environment variables" section
      # or in a .env file alongside this compose file. They are substituted below:
      - FP_HA_URL=${FP_HA_URL}
      - FP_HA_TOKEN=${FP_HA_TOKEN}

volumes:
  family-panel-data:
